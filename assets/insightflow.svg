  </text>


  <rect x="868" y="270" width="168" height="100" rx="14"
        fill="#1A192B" stroke="#6A9682"/>

  <text x="952" y="303" font-size="12" font-weight="700" fill="#F4F2FF">
    AI LAYER
  </text>

  <text x="952" y="328" font-size="10" fill="#B5B0CD">
