<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgInsight" x1="0" y1="0" x2="1200" y2="640">
    <stop stop-color="#0C0D18"/>
    <stop offset=".55" stop-color="#17162A"/>
    <stop offset="1" stop-color="#0D1218"/>
  </linearGradient>

  <linearGradient id="accentInsight" x1="60" y1="70" x2="1140" y2="580">
    <stop stop-color="#8477C7"/>
    <stop offset=".52" stop-color="#665B91"/>
    <stop offset="1" stop-color="#73AD94"/>
  </linearGradient>

  <pattern id="gridInsight" width="38" height="38" patternUnits="userSpaceOnUse">
    <path d="M38 0H0V38" stroke="#2F2C4A" stroke-width="1" opacity=".22"/>
  </pattern>

  <filter id="glowInsight" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="2.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <marker id="arrowInsight" viewBox="0 0 10 10" refX="9" refY="5"
          markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0 0L10 5L0 10Z" fill="#8477C7"/>
  </marker>
</defs>

<rect width="1200" height="640" rx="28" fill="url(#bgInsight)"/>
<rect width="1200" height="640" rx="28" fill="url(#gridInsight)"/>

<rect x="32" y="32" width="1136" height="576" rx="22"
      fill="#10111E" fill-opacity=".94"
      stroke="url(#accentInsight)" stroke-width="2"/>

<text x="78" y="88"
      font-family="JetBrains Mono,Consolas,monospace"
      font-size="15" font-weight="700" letter-spacing="4"
      fill="#89C3A9">
  ANALYTICS PLATFORM // ARCHITECTURE
</text>

<text x="78" y="158"
