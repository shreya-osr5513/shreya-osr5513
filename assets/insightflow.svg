<!-- ANIMATED DATA FLOW -->

<path d="M90 548H1110"
      stroke="url(#accentInsight)"
      stroke-width="1.8"
      stroke-dasharray="10 8">
  <animate attributeName="stroke-dashoffset"
           values="0;-72"
           dur="5s"
           repeatCount="indefinite"/>
</path>

<circle cx="110" cy="548" r="6"
        fill="#89C3A9" filter="url(#glowInsight)">
  <animate attributeName="cx"
           values="110;1090;110"
           dur="6.5s"
           repeatCount="indefinite"/>
</circle>

<text x="78" y="585"
      font-family="JetBrains Mono,Consolas,monospace"
      font-size="11" letter-spacing=".6"
      fill="#85819B">
  RAW DATA → PROCESSING → KPI CALCULATION → VISUALIZATION → AI RECOMMENDATIONS → STREAMLIT DASHBOARD
</text>

</svg>
