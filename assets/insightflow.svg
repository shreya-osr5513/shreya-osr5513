  </text>

  <text x="952" y="348" font-size="9" fill="#85819B">
    business recommendations
  </text>

</g>

<g fill="none" stroke="#8477C7" stroke-width="2" marker-end="url(#arrowInsight)">
  <path d="M236 320H258"/>
  <path d="M436 320H458"/>
  <path d="M636 320H658"/>
  <path d="M836 320H858"/>
</g>

<!-- STREAMLIT APP -->

