<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="430">
    <stop stop-color="#050A12"/>
    <stop offset=".52" stop-color="#081827"/>
    <stop offset="1" stop-color="#061019"/>
  </linearGradient>
  <linearGradient id="accent" x1="180" y1="60" x2="1180" y2="350">
    <stop stop-color="#68D8FF"/>
    <stop offset=".5" stop-color="#9D7BFF"/>
    <stop offset="1" stop-color="#71E8C7"/>
  </linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0H0V40" stroke="#153247" stroke-width="1" opacity=".35"/>
  </pattern>
  <clipPath id="clip">
    <path d="M120 70H1020L1110 155V360H210L120 275Z"/>
  </clipPath>
</defs>

<rect width="1400" height="430" rx="28" fill="url(#bg)"/>
<rect width="1400" height="430" rx="28" fill="url(#grid)"/>

<g stroke="url(#accent)" stroke-width="2" opacity=".7">
  <path d="M0 100H110L155 145H275" stroke-dasharray="320" stroke-dashoffset="320">
    <animate attributeName="stroke-dashoffset" values="320;0;0" dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M1400 320H1290L1245 275H1115" stroke-dasharray="320" stroke-dashoffset="320">
    <animate attributeName="stroke-dashoffset" values="320;0;0" dur="5s" begin="1s" repeatCount="indefinite"/>
  </path>
  <path d="M104 430V370L158 316H255" stroke-dasharray="240" stroke-dashoffset="240">
    <animate attributeName="stroke-dashoffset" values="240;0;0" dur="4.5s" begin=".5s" repeatCount="indefinite"/>
  </path>
  <path d="M1285 0V62L1232 115H1130" stroke-dasharray="240" stroke-dashoffset="240">
    <animate attributeName="stroke-dashoffset" values="240;0;0" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
  </path>
</g>

<path d="M120 70H1020L1110 155V360H210L120 275Z" fill="#07131F" fill-opacity=".88" stroke="url(#accent)" stroke-width="2.5"/>
<g clip-path="url(#clip)">
  <rect x="100" y="60" width="8" height="320" fill="#79E9FF" opacity=".14" filter="url(#glow)">
    <animate attributeName="x" values="100;1120;100" dur="7s" repeatCount="indefinite"/>
  </rect>
</g>

<text x="205" y="122" font-family="JetBrains Mono,Consolas,monospace" font-size="17" letter-spacing="4" fill="#78E4FF">
  ENGINEERING PROFILE // 2026
</text>

<text x="205" y="225" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="86" font-weight="900" letter-spacing="-2" fill="url(#accent)" filter="url(#glow)">
  SHREYA GUPTA
</text>

<text x="210" y="274" font-family="JetBrains Mono,Consolas,monospace" font-size="20" fill="#CBE8F2">
  THIRD-YEAR B.TECH ECE-AI STUDENT • IGDTUW
</text>

<g font-family="JetBrains Mono,Consolas,monospace" font-size="17" fill="#78E8D0">
  <text x="210" y="320" opacity="0">
    Backend systems that stay reliable under pressure.
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.08;.22;.3;1" dur="12s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="-50 0;0 0;0 0;40 0;40 0" keyTimes="0;.08;.22;.3;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="210" y="320" opacity="0">
    Applied AI where it actually improves the product.
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.3;.38;.52;.6;1" dur="12s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 28;0 28;0 0;0 0;0 -28;0 -28" keyTimes="0;.3;.38;.52;.6;1" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="210" y="320" opacity="0">
    APIs, automation, data, and intelligence—working together.
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.6;.68;.82;.9;1" dur="12s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values=".94 1;.94 1;1 1;1 1;1.06 1;1.06 1" keyTimes="0;.6;.68;.82;.9;1" dur="12s" repeatCount="indefinite"/>
  </text>
</g>

<g transform="translate(1175 78)">
  <path d="M70 0L132 36V108L70 144L8 108V36Z" fill="#081A28" stroke="url(#accent)" stroke-width="2.2"/>
  <path d="M70 18L116 44V100L70 126L24 100V44Z" fill="none" stroke="#32536A"/>
  <text x="70" y="84" text-anchor="middle" font-family="JetBrains Mono,Consolas,monospace" font-size="34" font-weight="900" fill="#83E7D1">SG</text>
  <animateTransform attributeName="transform" type="translate" values="1175 78;1175 68;1175 78" dur="3.5s" repeatCount="indefinite"/>
</g>

<g fill="#72E7CC" filter="url(#glow)">
  <circle cx="155" cy="145" r="5"><animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="1245" cy="275" r="5"><animate attributeName="r" values="4;7;4" dur="2s" begin=".7s" repeatCount="indefinite"/></circle>
</g>
