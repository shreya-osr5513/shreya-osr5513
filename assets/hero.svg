<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="430">
    <stop stop-color="#0B1118"/>
    <stop offset=".55" stop-color="#101C27"/>
    <stop offset="1" stop-color="#0C131B"/>
  </linearGradient>

  <linearGradient id="accent" x1="180" y1="70" x2="1160" y2="350">
    <stop stop-color="#8DB7D6"/>
    <stop offset=".5" stop-color="#B4C9E8"/>
    <stop offset="1" stop-color="#89C7B5"/>
  </linearGradient>

  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="1.8" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M44 0H0V44" stroke="#263746" stroke-width="1" opacity=".22"/>
  </pattern>

  <clipPath id="panelClip">
    <path d="M120 72H1025L1110 157V360H210L120 275Z"/>
  </clipPath>
</defs>

<rect width="1400" height="430" rx="28" fill="url(#bg)"/>
<rect width="1400" height="430" rx="28" fill="url(#grid)"/>

<!-- quiet animated traces -->
<g stroke="url(#accent)" stroke-width="1.6" opacity=".48">
  <path d="M0 104H108L154 150H274" stroke-dasharray="220" stroke-dashoffset="220">
    <animate attributeName="stroke-dashoffset" values="220;0;0" dur="6.5s" repeatCount="indefinite"/>
  </path>
  <path d="M1400 322H1292L1246 276H1112" stroke-dasharray="220" stroke-dashoffset="220">
    <animate attributeName="stroke-dashoffset" values="220;0;0" dur="6.5s" begin="1.2s" repeatCount="indefinite"/>
  </path>
</g>

<path d="M120 72H1025L1110 157V360H210L120 275Z"
      fill="#101923" fill-opacity=".92"
      stroke="url(#accent)" stroke-width="1.8"/>

<g clip-path="url(#panelClip)">
  <rect x="110" y="65" width="5" height="305" fill="#B9D4E8" opacity=".07">
    <animate attributeName="x" values="110;1120;110" dur="9s" repeatCount="indefinite"/>
  </rect>
</g>

<text x="205" y="121"
      font-family="JetBrains Mono,Consolas,monospace"
      font-size="16" letter-spacing="4"
      fill="#9AB9CB">
  ENGINEERING PROFILE // 2026
</text>

<text x="205" y="222"
      font-family="Inter,Segoe UI,Arial,sans-serif"
      font-size="82" font-weight="850" letter-spacing="-1.5"
      fill="url(#accent)" filter="url(#soft)">
  SHREYA GUPTA
</text>

<text x="208" y="274"
      font-family="Inter,Segoe UI,Arial,sans-serif"
      font-size="24" font-weight="700"
      fill="#D8E5EC">
  Third-year B.Tech ECE-AI Student at IGDTUW
</text>

<!-- rotating profile line with softer transitions -->
<g font-family="JetBrains Mono,Consolas,monospace"
   font-size="18" fill="#A9C8D5">

  <text x="208" y="323" opacity="0">
    Building reliable backend systems with clear, practical architecture.
    <animate attributeName="opacity"
      values="0;1;1;0;0"
      keyTimes="0;.08;.23;.31;1"
      dur="14s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      values="-32 0;0 0;0 0;24 0;24 0"
      keyTimes="0;.08;.23;.31;1"
      dur="14s" repeatCount="indefinite"/>
  </text>

  <text x="208" y="323" opacity="0">
    Connecting APIs, automation, data, and applied AI into useful products.
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;.31;.39;.54;.62;1"
      dur="14s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      values="0 18;0 18;0 0;0 0;0 -18;0 -18"
      keyTimes="0;.31;.39;.54;.62;1"
      dur="14s" repeatCount="indefinite"/>
  </text>

  <text x="208" y="323" opacity="0">
    Learning deeply, building thoughtfully, and improving every system.
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;.62;.70;.86;.94;1"
      dur="14s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale"
      values=".97 1;.97 1;1 1;1 1;1.03 1;1.03 1"
      keyTimes="0;.62;.70;.86;.94;1"
      dur="14s" repeatCount="indefinite"/>
  </text>
</g>

<!-- restrained SG mark -->
<g transform="translate(1172 82)">
  <path d="M70 0L126 32V96L70 128L14 96V32Z"
        fill="#111C26" stroke="url(#accent)" stroke-width="1.7"/>
  <path d="M70 16L111 39V89L70 112L29 89V39Z"
        fill="none" stroke="#415766" stroke-width="1"/>
  <text x="70" y="75" text-anchor="middle"
        font-family="JetBrains Mono,Consolas,monospace"
        font-size="31" font-weight="800"
        fill="#9FC9BA">
    SG
  </text>
  <animateTransform attributeName="transform" type="translate"
    values="1172 82;1172 76;1172 82"
    dur="4.6s" repeatCount="indefinite"/>
</g>

<g fill="#9FC9BA">
  <circle cx="154" cy="150" r="4">
    <animate attributeName="r" values="3.5;5.5;3.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1246" cy="276" r="4">
    <animate attributeName="r" values="3.5;5.5;3.5" dur="2.8s" begin=".9s" repeatCount="indefinite"/>
  </circle>
</g>
</svg>